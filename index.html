<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jim Dyslin | Landscaping & Junk Removal</title>
  <meta name="description" content="Jim Dyslin provides straightforward landscaping and junk removal services in the Blue Earth area.">
  <style>
    :root {
      color-scheme: light;
      --green: #2f5d3a;
      --dark: #1f2a22;
      --tan: #f2eadf;
      --cream: #fffaf2;
      --muted: #5f6b61;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.5;
      color: var(--dark);
      background: linear-gradient(135deg, var(--cream), var(--tan));
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(760px, 100%);
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(47, 93, 58, 0.18);
      border-radius: 18px;
      padding: clamp(28px, 6vw, 56px);
      box-shadow: 0 20px 55px rgba(31, 42, 34, 0.12);
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--green);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.82rem;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.4rem, 8vw, 5rem);
      line-height: 0.95;
      color: var(--dark);
    }

    h2 {
      margin: 20px 0 0;
      font-size: clamp(1.25rem, 3vw, 1.75rem);
      color: var(--green);
      font-weight: 700;
    }

    p {
      margin: 22px 0 0;
      max-width: 58ch;
      color: var(--muted);
      font-size: 1.08rem;
    }

    ul {
      margin: 26px 0 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 10px;
      max-width: 420px;
    }

    li {
      padding: 12px 14px;
      border-left: 5px solid var(--green);
      background: rgba(47, 93, 58, 0.08);
      border-radius: 8px;
      font-weight: 700;
    }

    .contact {
      margin-top: 34px;
      padding-top: 24px;
      border-top: 1px solid rgba(47, 93, 58, 0.18);
      color: var(--dark);
      font-weight: 700;
    }

    .small {
      margin-top: 10px;
      font-size: 0.95rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Blue Earth area</p>
    <h1>Jim Dyslin</h1>
    <h2>Landscaping & Junk Removal</h2>
    <p>Straightforward help for outdoor work, cleanup, hauling, and property projects. A full website is coming soon.</p>
    <ul>
      <li>Landscaping</li>
      <li>Junk removal</li>
      <li>Cleanup and hauling</li>
    </ul>
    <div class="contact">Need help with a project?</div>
    <p class="small">Contact information will be posted here soon.</p>
  </main>
</body>
</html>
