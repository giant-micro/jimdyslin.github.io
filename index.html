<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Jim's Landscaping & Junk Removal | Blue Earth, MN</title>
  <meta name="description" content="Call Jim's Landscaping & Junk Removal for straightforward landscaping, cleanup, hauling, and junk removal services around Blue Earth, Minnesota.">
  <meta name="gm-workflow-check" content="Giant Micro workflow test 2026-05-10">
  <meta name="gm-auth-workflow-check" content="Giant Micro SSH auth workflow test 2026-05-10">
  <style>
    :root {
      --green: #004b12;
      --green-dark: #00370d;
      --white: #ffffff;
      --offwhite: #f7f7f1;
      --ink: #102516;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100svh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top right, rgba(0, 75, 18, .12), transparent 30%),
        var(--offwhite);
    }

    a { color: inherit; }

    .page {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
    }

    main {
      width: min(560px, 100%);
      margin: 0 auto;
      padding: max(18px, env(safe-area-inset-top)) 16px max(18px, env(safe-area-inset-bottom));
      flex: 1;
      display: grid;
      align-content: center;
      gap: 16px;
    }

    .card {
      background: var(--white);
      border: 6px solid var(--green);
      box-shadow: 10px 10px 0 rgba(0, 75, 18, .14);
      padding: clamp(18px, 5vw, 30px);
    }

    .brand {
      margin-bottom: 16px;
      text-align: center;
    }

    .logo {
      display: block;
      width: 100%;
      height: auto;
      margin: 0 auto;
    }

    .actions {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .call-button {
      display: block;
      width: 100%;
      min-height: 72px;
      padding: 14px 16px;
      border: 0;
      border-radius: 0;
      background: var(--green);
      color: var(--white);
      text-decoration: none;
      text-align: center;
      font-weight: 900;
      box-shadow: 6px 6px 0 rgba(0, 75, 18, .18);
    }

    .call-button:focus-visible {
      outline: 4px solid #95c99d;
      outline-offset: 3px;
    }

    .call-button .small {
      display: block;
      margin-bottom: 2px;
      font-size: .86rem;
      text-transform: uppercase;
      letter-spacing: .09em;
      opacity: .92;
    }

    .call-button .number {
      display: block;
      font-size: clamp(2rem, 9vw, 3rem);
      line-height: 1;
      letter-spacing: .02em;
    }

    .address {
      margin: 14px 0 0;
      color: var(--green-dark);
      text-align: center;
      font-size: .98rem;
      font-weight: 900;
    }

    @media (min-width: 720px) {
      main { padding-top: 42px; padding-bottom: 42px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <main>
      <section class="card" aria-label="Jim's Landscaping and Junk Removal business card">
        <div class="brand">
          <img class="logo" src="assets/logo-jims-landscaping-junk-removal-long.png" alt="Jim's Landscaping Junk Removal — For all your landscaping and junk removal needs" width="1200" height="900">
        </div>


        <div class="actions" aria-label="Call Jim">
          <a class="call-button" href="tel:+15075253357" aria-label="Call Jim's cell phone at 507-525-3357">
            <span class="small">Tap to call cell</span>
            <span class="number">507-525-3357</span>
          </a>
          <a class="call-button" href="tel:+15075263128" aria-label="Call Jim's office phone at 507-526-3128">
            <span class="small">Tap to call office</span>
            <span class="number">507-526-3128</span>
          </a>
        </div>

        <p class="address">P.O. Box 241 · Blue Earth, MN 56013</p>
      </section>
    </main>
  </div>
</body>
</html>
